<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <link rel="manifest" href="/manifest.json" />
    <title>DCDG Finanzas</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0b1220; color: #e6edf6; -webkit-tap-highlight-color: transparent;
      }
      header { padding: 16px; font-weight: 700; font-size: 20px; border-bottom: 1px solid #1e2a3d; }
      main { padding: 16px; max-width: 640px; margin: 0 auto; }
      textarea, input, select {
        width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #26344c;
        background: #111a2b; color: inherit; font-size: 16px; margin: 6px 0;
      }
      button {
        width: 100%; padding: 14px; border: 0; border-radius: 10px; font-size: 16px;
        font-weight: 600; background: #3b82f6; color: white; margin: 8px 0; cursor: pointer;
      }
      button.secondary { background: #1e293b; color: #cbd5e1; }
      .card { background: #0f1830; border: 1px solid #1e2a3d; border-radius: 14px; padding: 16px; margin: 12px 0; }
      .muted { color: #93a4bd; font-size: 13px; }
      .row { display: flex; gap: 8px; }
      .status { padding: 10px 12px; border-radius: 10px; margin: 8px 0; font-size: 14px; display: none; }
      .status.err { background: #3b1219; color: #fecaca; display: block; }
      .status.ok { background: #0f2b1c; color: #bbf7d0; display: block; }
      .status.info { background: #0f2036; color: #bfdbfe; display: block; }
    </style>
  </head>
  <body>
    <header>💰 DCDG Finanzas</header>
    <main>
      <div id="status" class="status"></div>

      <div class="card">
        <div class="row">
          <button id="btnLogin" class="secondary">Conectar Google</button>
          <button id="btnCfg" class="secondary">Ajustes</button>
        </div>
      </div>

      <div class="card">
        <label class="muted">Registrar gasto (texto o foto)</label>
        <textarea id="texto" rows="3" placeholder="Ej: gasté 45.000 en Éxito con la 2331"></textarea>
        <input id="foto" type="file" accept="image/*" capture="environment" />
        <button id="btnClasificar">Clasificar</button>
      </div>

      <div id="resultado" class="card" style="display:none">
        <label class="muted">Revisar y confirmar</label>
        <input id="rCategoria" placeholder="Categoría" />
        <input id="rSubcategoria" placeholder="Subcategoría" />
        <input id="rDescripcion" placeholder="Descripción / comercio" />
        <input id="rMonto" placeholder="Monto (COP)" />
        <input id="rMetodo" placeholder="Método de pago / cuenta" />
        <input id="rQuien" placeholder="Quién pagó (Luis / Carolina)" />
        <button id="btnGuardar">Guardar en Sheets</button>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
