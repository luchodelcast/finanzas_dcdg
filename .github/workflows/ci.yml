name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Tests y build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Pruebas unitarias
        run: npm test

      - name: Build de la PWA
        run: npm run build
